<form method="GET" class="mb-5">

    <div class="card border-0 shadow-sm">

        <div class="card-body p-4">

            <div class="row g-3 align-items-center">

                <div class="col-lg-8">

                    <input
                        type="text"
                        name="q"
                        class="form-control form-control-lg"
                        placeholder="Buscar por código, producto o marca..."
                        value="{{ request.GET.q }}"
                    >

                </div>

                <div class="col-lg-2">

                    {% if request.GET.categoria %}
                        <input
                            type="hidden"
                            name="categoria"
                            value="{{ request.GET.categoria }}"
                        >
                    {% endif %}

                    {% if request.GET.marca %}
                        <input
                            type="hidden"
                            name="marca"
                            value="{{ request.GET.marca }}"
                        >
                    {% endif %}

                    <button
                        type="submit"
                        class="btn btn-ecosa btn-lg w-100"
                    >

                        Buscar

                    </button>

                </div>

                <div class="col-lg-2">

                    <a
                        href="{% url 'catalogo' %}"
                        class="btn btn-outline-secondary btn-lg w-100"
                    >

                        Limpiar

                    </a>

                </div>

            </div>

        </div>

    </div>

</form>
